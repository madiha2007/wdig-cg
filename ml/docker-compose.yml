version: "3.9"

services:
  ml:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite feedback db across container restarts
      - ml_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ml_data:
